<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediCare AI Agent</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-app:       #1e1e1e;
      --bg-panel:     #252525;
      --bg-input:     #2e2e2e;
      --bg-msg-user:  #3a3a3a;
      --bg-msg-bot:   #2a2a2a;
      --border:       #3a3a3a;
      --accent:       #e0e0e0;
      --accent-btn:   #f0f0f0;
      --text-primary: #e8e8e8;
      --text-muted:   #888;
      --text-hint:    #d4a847;
      --btn-save-bg:  #e8e8e8;
      --btn-save-fg:  #1a1a1a;
      --btn-cancel-bg:#2e2e2e;
      --btn-cancel-fg:#ccc;
      --scrollbar:    #3a3a3a;
      --radius-lg:    14px;
      --radius-md:    10px;
      --radius-sm:    8px;
      --font: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg-app);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Scrollbar ────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    /* ── Header ───────────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #header .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #header .logo {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #3b82c4 0%, #1a5fa8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    #header .title { font-size: 17px; font-weight: 600; }
    #header .subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    #btn-settings {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
    }
    #btn-settings:hover { background: var(--bg-input); }

    /* ── Settings Overlay ─────────────────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      z-index: 100;
      padding-top: 0;
    }
    #overlay.hidden { display: none; }

    #settings-panel {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      width: 100%;
      padding: 24px 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: slideDown .2s ease;
    }

    @keyframes slideDown {
      from { transform: translateY(-20px); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; color: var(--text-muted); }

    .field input,
    .field textarea {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus,
    .field textarea:focus { border-color: #555; }
    .field input::placeholder { color: var(--text-muted); font-family: monospace; }

    .field textarea {
      resize: vertical;
      min-height: 110px;
      line-height: 1.5;
    }

    .settings-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .btn {
      padding: 9px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: opacity .15s, background .15s;
    }
    .btn:hover { opacity: .85; }

    .btn-cancel {
      background: var(--btn-cancel-bg);
      color: var(--btn-cancel-fg);
    }
    .btn-save {
      background: var(--btn-save-bg);
      color: var(--btn-save-fg);
      border-color: var(--btn-save-bg);
    }

    /* ── Chat Area ────────────────────────────────────────────────── */
    #chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Hint Banner ──────────────────────────────────────────────── */
    #hint {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px;
      font-size: 14px;
      color: var(--text-hint);
    }
    #hint.hidden { display: none; }

    /* ── Messages ─────────────────────────────────────────────────── */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 82%;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg.user .msg-avatar { background: #3a5a8a; }
    .msg.bot  .msg-avatar { background: linear-gradient(135deg, #3b82c4, #1a5fa8); }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: var(--radius-md);
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }
    .msg.user .msg-bubble { background: var(--bg-msg-user); border-bottom-right-radius: 4px; }
    .msg.bot  .msg-bubble { background: var(--bg-msg-bot);  border-bottom-left-radius: 4px; border: 1px solid var(--border); }

    /* ── Typing indicator ─────────────────────────────────────────── */
    .typing-dots { display: flex; gap: 5px; padding: 4px 2px; align-items: center; }
    .typing-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #666;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%            { transform: translateY(-6px); }
    }

    /* ── Input Row ────────────────────────────────────────────────── */
    #input-row {
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      border-top: 1px solid var(--border);
      background: var(--bg-panel);
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 24px;
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 14px;
      padding: 11px 18px;
      outline: none;
      transition: border-color .15s;
    }
    #user-input:focus { border-color: #555; }
    #user-input::placeholder { color: var(--text-muted); }

    #btn-send {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--btn-save-bg);
      color: var(--btn-save-fg);
      border: none;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity .15s;
    }
    #btn-send:hover  { opacity: .85; }
    #btn-send:disabled { opacity: .35; cursor: default; }

    /* ── Error toast ──────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #c0392b;
      color: #fff;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
      z-index: 200;
      max-width: 90%;
      text-align: center;
    }
    #toast.show { opacity: 1; }

    /* ── Responsive ───────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .field-row { grid-template-columns: 1fr; }
      .msg { max-width: 95%; }
    }
  </style>
  <!-- Populated by server.js — do not edit manually -->
  <script id="env-config">window.__ENV__ = {};</script>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────── -->
<div id="header">
  <div class="logo-area">
    <div class="logo">🏥</div>
    <div>
      <div class="title">MediCare AI Agent</div>
      <div class="subtitle">Medical &amp; Pharma Assistant &bull; Powered by Gemini</div>
    </div>
  </div>
  <button id="btn-settings">&#9633; Settings</button>
</div>

<!-- ── Settings Overlay ───────────────────────────────────────────── -->
<div id="overlay">
  <div id="settings-panel">

    <div class="field-row">
      <div class="field">
        <label>Organization / Clinic name</label>
        <input id="inp-org" type="text" placeholder="MediCare Organization" />
      </div>
      <div class="field">
        <label>Gemini API Key</label>
        <input id="inp-key" type="password" placeholder="Paste Gemini API key..." />
      </div>
    </div>

    <div class="field">
      <label>Agent system prompt (editable)</label>
      <textarea id="inp-prompt"></textarea>
    </div>

    <div class="settings-actions">
      <button class="btn btn-cancel" id="btn-cancel">Cancel</button>
      <button class="btn btn-save"   id="btn-save">&#10003; Save &amp; Activate Agent</button>
    </div>

  </div>
</div>

<!-- ── Chat ───────────────────────────────────────────────────────── -->
<div id="chat-area">
  <div id="messages">
    <div id="hint">
      &#128395; Enter your Gemini API key and organization name in Settings to activate the agent.
    </div>
  </div>

  <div id="input-row">
    <input id="user-input" type="text"
           placeholder="Ask about symptoms, medicines, health tips..."
           disabled autocomplete="off" />
    <button id="btn-send" disabled>&#8593;</button>
  </div>
</div>

<!-- ── Toast ──────────────────────────────────────────────────────── -->
<div id="toast"></div>

<script>
  /* ── State ──────────────────────────────────────────────────────── */
  const DEFAULT_PROMPT = org => `You are MediCare AI, a professional, friendly, and trustworthy medical and pharmaceutical assistant created by ${org}. You help patients and the general public with:

1. MEDICAL GUIDANCE: Understand symptoms, suggest possible conditions, explain when to see a doctor, describe common diseases, first-aid steps, and healthy lifestyle tips.

2. PHARMACEUTICAL INFO: Medicine name (generic & brand), what it treats, standard dosage, side effects, drug interactions, prescription requirements, storage, and what to do if a dose is missed.

RULES:
- Always clarify you are providing general information, not a prescription or diagnosis.
- Never recommend a medicine without the user describing their condition first.
- Always end responses with: "Please consult your doctor or pharmacist before starting, stopping, or changing any medication."
- Flag dangerous drug interactions clearly.
- If a user mentions severe symptoms, advise them to seek immediate medical attention.
- Be accurate, concise, and non-alarmist.`;

  // Values injected by server.js from .env (replaced at serve-time)
  const __ENV__ = window.__ENV__ || {};

  let config = { org: '', apiKey: '', systemPrompt: '' };
  let activated = false;
  let history   = [];   // [{role, parts:[{text}]}]

  /* ── DOM refs ───────────────────────────────────────────────────── */
  const overlay    = document.getElementById('overlay');
  const inpOrg     = document.getElementById('inp-org');
  const inpKey     = document.getElementById('inp-key');
  const inpPrompt  = document.getElementById('inp-prompt');
  const btnCancel  = document.getElementById('btn-cancel');
  const btnSave    = document.getElementById('btn-save');
  const btnSettings= document.getElementById('btn-settings');
  const messages   = document.getElementById('messages');
  const hint       = document.getElementById('hint');
  const userInput  = document.getElementById('user-input');
  const btnSend    = document.getElementById('btn-send');
  const toast      = document.getElementById('toast');

  /* ── Init default prompt ────────────────────────────────────────── */
  // Pre-fill from .env if server injected values
  if (__ENV__.ORG_NAME)       inpOrg.value = __ENV__.ORG_NAME;
  if (__ENV__.GEMINI_API_KEY) inpKey.value = __ENV__.GEMINI_API_KEY;
  inpPrompt.value = DEFAULT_PROMPT(__ENV__.ORG_NAME || 'your organization');

  /* ── Settings open/close ────────────────────────────────────────── */
  btnSettings.addEventListener('click', openSettings);
  btnCancel.addEventListener('click', closeSettings);

  function openSettings() {
    inpOrg.value    = config.org;
    inpKey.value    = config.apiKey;
    inpPrompt.value = config.systemPrompt || DEFAULT_PROMPT(config.org || 'your organization');
    overlay.classList.remove('hidden');
  }

  function closeSettings() {
    if (!activated) return;   // must save first time
    overlay.classList.add('hidden');
  }

  /* ── Save & Activate ────────────────────────────────────────────── */
  btnSave.addEventListener('click', () => {
    const org    = inpOrg.value.trim();
    const apiKey = inpKey.value.trim();
    const prompt = inpPrompt.value.trim();

    if (!org)    { showToast('Please enter your organization name.'); return; }
    if (!apiKey) { showToast('Please paste your Gemini API key.'); return; }
    if (!prompt) { showToast('System prompt cannot be blank.'); return; }

    config = { org, apiKey, systemPrompt: prompt };
    activated = true;
    history   = [];

    overlay.classList.add('hidden');
    hint.classList.add('hidden');
    userInput.disabled = false;
    btnSend.disabled   = false;
    userInput.placeholder = 'Ask about symptoms, medicines, health tips...';
    userInput.focus();

    // Welcome message
    if (messages.querySelectorAll('.msg').length === 0) {
      appendBotMessage(`Hello! I'm MediCare AI, your medical and pharmaceutical assistant from **${org}**. How can I help you today?`);
    }
  });

  /* ── Chat ───────────────────────────────────────────────────────── */
  btnSend.addEventListener('click', sendMessage);
  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || !activated) return;

    userInput.value = '';
    btnSend.disabled = true;
    userInput.disabled = true;

    appendUserMessage(text);
    history.push({ role: 'user', parts: [{ text }] });

    const typingEl = appendTyping();

    try {
      const reply = await callGemini(text);
      typingEl.remove();
      appendBotMessage(reply);
      history.push({ role: 'model', parts: [{ text: reply }] });
    } catch (err) {
      typingEl.remove();
      const errMsg = parseGeminiError(err);
      appendBotMessage(`⚠️ ${errMsg}`);
    } finally {
      btnSend.disabled   = false;
      userInput.disabled = false;
      userInput.focus();
    }
  }

  /* ── Gemini API call ────────────────────────────────────────────── */
  async function callGemini(userText) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${config.apiKey}`;

    const body = {
      system_instruction: { parts: [{ text: config.systemPrompt }] },
      contents: history,
      generationConfig: {
        temperature: 0.7,
        maxOutputTokens: 1024,
      }
    };

    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw errData;
    }

    const data = await res.json();
    const candidate = data.candidates?.[0];
    if (!candidate) throw new Error('No response from Gemini.');
    return candidate.content.parts.map(p => p.text).join('');
  }

  function parseGeminiError(err) {
    if (err?.error?.message) return err.error.message;
    if (err?.message) return err.message;
    return 'Failed to reach the Gemini API. Check your API key and network.';
  }

  /* ── Render helpers ─────────────────────────────────────────────── */
  function appendUserMessage(text) {
    const el = document.createElement('div');
    el.className = 'msg user';
    el.innerHTML = `
      <div class="msg-avatar">👤</div>
      <div class="msg-bubble">${escHtml(text)}</div>`;
    messages.appendChild(el);
    scrollBottom();
  }

  function appendBotMessage(text) {
    const el = document.createElement('div');
    el.className = 'msg bot';
    el.innerHTML = `
      <div class="msg-avatar">🏥</div>
      <div class="msg-bubble">${formatMd(text)}</div>`;
    messages.appendChild(el);
    scrollBottom();
  }

  function appendTyping() {
    const el = document.createElement('div');
    el.className = 'msg bot';
    el.innerHTML = `
      <div class="msg-avatar">🏥</div>
      <div class="msg-bubble">
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>`;
    messages.appendChild(el);
    scrollBottom();
    return el;
  }

  function scrollBottom() {
    messages.scrollTop = messages.scrollHeight;
  }

  /* ── Minimal markdown renderer ──────────────────────────────────── */
  function formatMd(text) {
    return escHtml(text)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,     '<em>$1</em>')
      .replace(/`(.+?)`/g,       '<code style="background:#333;padding:1px 5px;border-radius:4px">$1</code>')
      .replace(/\n/g,            '<br>');
  }

  function escHtml(str) {
    return str
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  /* ── Toast ──────────────────────────────────────────────────────── */
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
  }
</script>
</body>
</html>
