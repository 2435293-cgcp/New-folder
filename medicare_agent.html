<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediCare AI Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: 'Inter', 'Segoe UI', system-ui, sans-serif;
      --glass:        rgba(255,255,255,0.04);
      --glass-strong: rgba(10,14,35,0.88);
      --glass-border: rgba(255,255,255,0.08);
      --glass-border-hi: rgba(255,255,255,0.14);
      --blur: blur(24px);
      --text: #e2e8f0;
      --text-muted: rgba(148,163,184,0.8);
      --text-hint: #f59e0b;
      --accent: #818cf8;
      --user-bubble: rgba(99,102,241,0.18);
      --user-border: rgba(129,140,248,0.32);
      --bot-bubble:  rgba(255,255,255,0.04);
      --bot-border:  rgba(255,255,255,0.08);
      --r-xl: 22px; --r-lg: 16px; --r-md: 12px; --r-sm: 8px; --r-full: 9999px;
    }

    html, body { height: 100%; font-family: var(--font); color: var(--text); overflow: hidden; }

    body {
      background: #030712;
      display: flex;
      flex-direction: column;
    }

    /* ── Scrollbar ─────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    /* ── Animated Background Orbs ──────────────────────────────── */
    #bg {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden; pointer-events: none;
    }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(90px); opacity: 0.38;
    }
    .orb-1 {
      width: 650px; height: 650px;
      background: radial-gradient(circle, #4f46e5 0%, #7c3aed 100%);
      top: -220px; left: -180px;
      animation: float1 26s ease-in-out infinite;
    }
    .orb-2 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, #0891b2 0%, #0e7490 100%);
      top: -120px; right: -120px;
      animation: float2 32s ease-in-out infinite;
    }
    .orb-3 {
      width: 480px; height: 480px;
      background: radial-gradient(circle, #7c3aed 0%, #a855f7 100%);
      bottom: -60px; right: 80px;
      animation: float3 22s ease-in-out infinite;
    }
    .orb-4 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, #059669 0%, #0d9488 100%);
      bottom: -120px; left: 160px;
      animation: float4 28s ease-in-out infinite;
    }
    @keyframes float1 {
      0%,100% { transform: translate(0,0) scale(1); }
      25%      { transform: translate(80px,70px) scale(1.1); }
      50%      { transform: translate(40px,130px) scale(0.94); }
      75%      { transform: translate(-50px,55px) scale(1.06); }
    }
    @keyframes float2 {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(-75px,85px) scale(1.09); }
      66%      { transform: translate(-30px,35px) scale(0.91); }
    }
    @keyframes float3 {
      0%,100% { transform: translate(0,0) scale(1); }
      40%      { transform: translate(-65px,-85px) scale(1.12); }
      70%      { transform: translate(55px,-45px) scale(0.9); }
    }
    @keyframes float4 {
      0%,100% { transform: translate(0,0) scale(1); }
      30%      { transform: translate(65px,-75px) scale(1.08); }
      60%      { transform: translate(-55px,-30px) scale(0.94); }
    }

    /* ── App shell ─────────────────────────────────────────────── */
    .app {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      height: 100vh;
    }

    /* ── Header ────────────────────────────────────────────────── */
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 22px;
      background: rgba(3,7,18,0.65);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid var(--glass-border);
      flex-shrink: 0;
    }
    .logo-area { display: flex; align-items: center; gap: 13px; }

    .logo {
      width: 46px; height: 46px; border-radius: 14px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
      box-shadow: 0 0 22px rgba(99,102,241,0.5);
      animation: logoPulse 3s ease-in-out infinite;
      position: relative;
    }
    .logo::after {
      content: ''; position: absolute; inset: -4px;
      border-radius: 18px;
      border: 1.5px solid rgba(129,140,248,0.35);
      animation: logoRing 3s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%,100% { box-shadow: 0 0 22px rgba(99,102,241,0.45); }
      50%      { box-shadow: 0 0 40px rgba(99,102,241,0.75), 0 0 70px rgba(99,102,241,0.2); }
    }
    @keyframes logoRing {
      0%,100% { opacity: 0.3; transform: scale(1); }
      50%      { opacity: 0.85; transform: scale(1.06); }
    }

    .header-text .title   { font-size: 16px; font-weight: 600; letter-spacing: -.01em; color: #f1f5f9; }
    .header-text .subtitle{ font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }

    .header-right { display: flex; align-items: center; gap: 10px; }

    #status-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border); border-radius: var(--r-full);
      font-size: 11.5px; color: var(--text-muted);
      opacity: 0; transform: scale(0.85);
      transition: opacity .45s ease, transform .45s cubic-bezier(0.34,1.56,0.64,1);
    }
    #status-pill.visible { opacity: 1; transform: scale(1); }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4ade80; box-shadow: 0 0 7px #4ade80;
      animation: statusPulse 2s ease-in-out infinite;
    }
    @keyframes statusPulse {
      0%,100% { opacity: 1; box-shadow: 0 0 7px #4ade80; }
      50%      { opacity: 0.45; box-shadow: 0 0 14px #4ade80; }
    }

    #btn-settings {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 15px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border-hi);
      border-radius: var(--r-sm);
      color: var(--text); font-family: var(--font);
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all .22s ease; overflow: hidden; position: relative;
    }
    #btn-settings::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg,transparent,rgba(255,255,255,0.07),transparent);
      transform: translateX(-100%); transition: transform .4s ease;
    }
    #btn-settings:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.22); }
    #btn-settings:hover::after { transform: translateX(100%); }

    /* ── Settings Overlay ──────────────────────────────────────── */
    #overlay {
      position: fixed; inset: 0;
      background: rgba(3,7,18,0.72);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
      animation: overlayIn .25s ease;
    }
    #overlay.hidden { display: none; }
    @keyframes overlayIn { from { opacity:0; } to { opacity:1; } }

    #settings-panel {
      background: var(--glass-strong);
      backdrop-filter: blur(44px); -webkit-backdrop-filter: blur(44px);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: var(--r-xl);
      box-shadow: 0 30px 70px rgba(0,0,0,0.65),
                  inset 0 1px 0 rgba(255,255,255,0.06);
      width: 100%; max-width: 620px;
      padding: 28px 28px 24px;
      display: flex; flex-direction: column; gap: 18px;
      animation: modalIn .32s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes modalIn {
      from { opacity:0; transform: scale(0.86) translateY(28px); }
      to   { opacity:1; transform: scale(1)    translateY(0); }
    }

    .settings-header { display: flex; align-items: center; }
    .settings-title {
      font-size: 15.5px; font-weight: 600; color: #f1f5f9;
      display: flex; align-items: center; gap: 8px;
    }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 7px; }
    .field label {
      font-size: 11px; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; color: rgba(148,163,184,0.7);
    }

    .field input, .field textarea {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--r-md);
      color: var(--text); font-family: var(--font);
      font-size: 13.5px; padding: 10px 14px; outline: none;
      transition: border-color .22s, box-shadow .22s, background .22s;
    }
    .field input:focus, .field textarea:focus {
      border-color: rgba(129,140,248,0.55);
      background: rgba(99,102,241,0.07);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.13);
    }
    .field input::placeholder { color: rgba(148,163,184,0.4); font-size: 13px; }
    .field textarea { resize: vertical; min-height: 120px; line-height: 1.6; }

    .settings-actions { display: flex; justify-content: flex-end; gap: 12px; }

    .btn {
      padding: 10px 22px; border-radius: var(--r-md);
      font-size: 13.5px; font-weight: 500; font-family: var(--font);
      cursor: pointer; transition: all .22s ease;
    }
    .btn-cancel {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(148,163,184,0.9);
    }
    .btn-cancel:hover { background: rgba(255,255,255,0.09); color: var(--text); }

    .btn-save {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: 1px solid rgba(129,140,248,0.35); color: #fff;
      box-shadow: 0 4px 18px rgba(99,102,241,0.4);
    }
    .btn-save:hover {
      box-shadow: 0 6px 28px rgba(99,102,241,0.6);
      transform: translateY(-1px);
    }
    .btn-save:active { transform: translateY(0); }

    /* ── Chat ───────────────────────────────────────────────────── */
    #chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    #messages {
      flex: 1; overflow-y: auto;
      padding: 24px 22px;
      display: flex; flex-direction: column; gap: 16px;
    }

    /* ── Hint ───────────────────────────────────────────────────── */
    #hint {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; flex: 1;
      text-align: center; padding: 60px 20px;
      animation: hintFloat 4s ease-in-out infinite;
    }
    #hint.hidden { display: none; }

    .hint-icon {
      font-size: 54px;
      filter: drop-shadow(0 0 22px rgba(245,158,11,0.45));
      animation: hintGlow 2s ease-in-out infinite;
    }
    .hint-title { font-size: 18px; font-weight: 600; color: #f1f5f9; }
    .hint-text  { font-size: 14px; color: var(--text-hint); max-width: 320px; line-height: 1.65; }
    .hint-sub   { font-size: 12px; color: var(--text-muted); }

    @keyframes hintFloat {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }
    @keyframes hintGlow {
      0%,100% { filter: drop-shadow(0 0 22px rgba(245,158,11,0.4)); }
      50%      { filter: drop-shadow(0 0 40px rgba(245,158,11,0.75)); }
    }

    /* ── Messages ───────────────────────────────────────────────── */
    .msg { display: flex; gap: 10px; max-width: 80%; }

    .msg.user {
      align-self: flex-end; flex-direction: row-reverse;
      animation: msgInRight .36s cubic-bezier(0.34,1.56,0.64,1);
    }
    .msg.bot {
      align-self: flex-start;
      animation: msgInLeft .36s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes msgInRight {
      from { opacity:0; transform: translateX(32px) scale(0.91); }
      to   { opacity:1; transform: none; }
    }
    @keyframes msgInLeft {
      from { opacity:0; transform: translateX(-32px) scale(0.91); }
      to   { opacity:1; transform: none; }
    }

    .msg-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0; margin-top: 3px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .msg.user .msg-avatar {
      background: linear-gradient(135deg,rgba(99,102,241,.3),rgba(139,92,246,.3));
      box-shadow: 0 0 14px rgba(99,102,241,.25);
    }
    .msg.bot .msg-avatar {
      background: linear-gradient(135deg,rgba(6,182,212,.25),rgba(99,102,241,.25));
      box-shadow: 0 0 14px rgba(6,182,212,.2);
    }

    .msg-bubble {
      padding: 12px 16px; border-radius: var(--r-lg);
      font-size: 14px; line-height: 1.68; word-break: break-word;
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      transition: box-shadow .2s ease;
    }
    .msg-bubble:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.25); }

    .msg.user .msg-bubble {
      background: var(--user-bubble);
      border: 1px solid var(--user-border);
      border-bottom-right-radius: 4px;
      box-shadow: 0 2px 14px rgba(99,102,241,0.14);
    }
    .msg.bot .msg-bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--bot-border);
      border-bottom-left-radius: 4px;
    }

    /* ── Typing ─────────────────────────────────────────────────── */
    .typing-dots { display: flex; gap: 6px; padding: 4px 2px; align-items: center; }
    .typing-dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      animation: wave 1.4s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .16s; }
    .typing-dots span:nth-child(3) { animation-delay: .32s; }
    @keyframes wave {
      0%,60%,100% { transform: translateY(0); opacity: 0.55; }
      30%          { transform: translateY(-9px); opacity: 1; }
    }

    /* ── Input Row ──────────────────────────────────────────────── */
    #input-row {
      padding: 14px 20px;
      display: flex; gap: 10px; align-items: center;
      background: rgba(3,7,18,0.65);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border-top: 1px solid var(--glass-border);
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--r-full);
      color: var(--text); font-family: var(--font);
      font-size: 14px; padding: 12px 20px; outline: none;
      transition: border-color .25s, box-shadow .25s, background .25s;
    }
    #user-input:focus {
      border-color: rgba(129,140,248,0.45);
      background: rgba(99,102,241,0.06);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.11), 0 0 22px rgba(99,102,241,0.09);
    }
    #user-input::placeholder { color: rgba(148,163,184,0.38); }
    #user-input:disabled { opacity: .4; cursor: not-allowed; }

    #btn-send {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none; color: #fff; font-size: 17px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      box-shadow: 0 4px 18px rgba(99,102,241,0.5);
      transition: all .22s ease;
      position: relative; overflow: hidden;
    }
    #btn-send::before {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      background: radial-gradient(circle,rgba(255,255,255,0.22),transparent 68%);
      opacity: 0; transition: opacity .2s;
    }
    #btn-send:hover:not(:disabled) {
      box-shadow: 0 6px 30px rgba(99,102,241,0.7);
      transform: scale(1.08);
    }
    #btn-send:hover:not(:disabled)::before { opacity: 1; }
    #btn-send:active:not(:disabled) { transform: scale(0.94); }
    #btn-send:disabled { opacity: .32; cursor: not-allowed; box-shadow: none; }

    /* Ripple */
    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.32);
      transform: scale(0);
      animation: rippleAnim .5s ease-out forwards;
      pointer-events: none;
    }
    @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

    /* ── Toast ──────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 82px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(239,68,68,0.88);
      backdrop-filter: blur(14px);
      color: #fff; padding: 10px 20px;
      border-radius: var(--r-md); font-size: 13px; font-weight: 500;
      opacity: 0; pointer-events: none;
      transition: opacity .3s ease, transform .3s ease;
      z-index: 200; max-width: 90%; text-align: center;
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .field-row { grid-template-columns: 1fr; }
      .msg { max-width: 95%; }
      #settings-panel { border-radius: var(--r-lg); padding: 20px; }
    }
  </style>
  <!-- Populated by server.js — do not edit manually -->
  <script id="env-config">window.__ENV__ = {};</script>
</head>
<body>

<!-- ── Animated background orbs ───────────────────────────────────── -->
<div id="bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>

<div class="app">

  <!-- ── Header ───────────────────────────────────────────────────── -->
  <div id="header">
    <div class="logo-area">
      <div class="logo">🏥</div>
      <div class="header-text">
        <div class="title">MediCare AI Agent</div>
        <div class="subtitle">Medical &amp; Pharma Assistant &bull; Powered by Gemini</div>
      </div>
    </div>
    <div class="header-right">
      <div id="status-pill">
        <div class="status-dot"></div>
        <span>Active</span>
      </div>
      <button id="btn-settings">⚙ Settings</button>
    </div>
  </div>

  <!-- ── Settings Overlay ─────────────────────────────────────────── -->
  <div id="overlay">
    <div id="settings-panel">

      <div class="settings-header">
        <div class="settings-title">⚙&nbsp; Configure Agent</div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>Organization / Clinic name</label>
          <input id="inp-org" type="text" placeholder="MediCare Organization" />
        </div>
        <div class="field">
          <label>Gemini API Key</label>
          <input id="inp-key" type="password" placeholder="Paste Gemini API key..." />
        </div>
      </div>

      <div class="field">
        <label>Agent system prompt (editable)</label>
        <textarea id="inp-prompt"></textarea>
      </div>

      <div class="settings-actions">
        <button class="btn btn-cancel" id="btn-cancel">Cancel</button>
        <button class="btn btn-save"   id="btn-save">&#10003; Save &amp; Activate Agent</button>
      </div>

    </div>
  </div>

  <!-- ── Chat ─────────────────────────────────────────────────────── -->
  <div id="chat-area">
    <div id="messages">
      <div id="hint">
        <div class="hint-icon">🏥</div>
        <div class="hint-title">MediCare AI</div>
        <div class="hint-text">Enter your Gemini API key and organization name in Settings to activate the agent.</div>
        <div class="hint-sub">Medical &amp; Pharmaceutical Assistant</div>
      </div>
    </div>

    <div id="input-row">
      <input id="user-input" type="text"
             placeholder="Ask about symptoms, medicines, health tips..."
             disabled autocomplete="off" />
      <button id="btn-send" disabled>&#8593;</button>
    </div>
  </div>

</div>

<!-- ── Toast ──────────────────────────────────────────────────────── -->
<div id="toast"></div>

<script>
  /* ── State ──────────────────────────────────────────────────────── */
  const DEFAULT_PROMPT = org => `You are MediCare AI, a professional, friendly, and trustworthy medical and pharmaceutical assistant created by ${org}. You help patients and the general public with:

1. MEDICAL GUIDANCE: Understand symptoms, suggest possible conditions, explain when to see a doctor, describe common diseases, first-aid steps, and healthy lifestyle tips.

2. PHARMACEUTICAL INFO: Medicine name (generic & brand), what it treats, standard dosage, side effects, drug interactions, prescription requirements, storage, and what to do if a dose is missed.

RULES:
- Always clarify you are providing general information, not a prescription or diagnosis.
- Never recommend a medicine without the user describing their condition first.
- Always end responses with: "Please consult your doctor or pharmacist before starting, stopping, or changing any medication."
- Flag dangerous drug interactions clearly.
- If a user mentions severe symptoms, advise them to seek immediate medical attention.
- Be accurate, concise, and non-alarmist.`;

  // Values injected by server.js from .env (replaced at serve-time)
  const __ENV__ = window.__ENV__ || {};

  let config    = { org: '', apiKey: '', systemPrompt: '' };
  let activated = false;
  let history   = [];

  /* ── DOM refs ───────────────────────────────────────────────────── */
  const overlay     = document.getElementById('overlay');
  const inpOrg      = document.getElementById('inp-org');
  const inpKey      = document.getElementById('inp-key');
  const inpPrompt   = document.getElementById('inp-prompt');
  const btnCancel   = document.getElementById('btn-cancel');
  const btnSave     = document.getElementById('btn-save');
  const btnSettings = document.getElementById('btn-settings');
  const messages    = document.getElementById('messages');
  const hint        = document.getElementById('hint');
  const userInput   = document.getElementById('user-input');
  const btnSend     = document.getElementById('btn-send');
  const toast       = document.getElementById('toast');
  const statusPill  = document.getElementById('status-pill');

  /* ── Init: pre-fill from .env ───────────────────────────────────── */
  if (__ENV__.ORG_NAME)       inpOrg.value = __ENV__.ORG_NAME;
  if (__ENV__.GEMINI_API_KEY) inpKey.value = __ENV__.GEMINI_API_KEY;
  inpPrompt.value = DEFAULT_PROMPT(__ENV__.ORG_NAME || 'your organization');

  /* ── Settings open/close ────────────────────────────────────────── */
  btnSettings.addEventListener('click', openSettings);
  btnCancel.addEventListener('click', closeSettings);

  function openSettings() {
    inpOrg.value    = config.org;
    inpKey.value    = config.apiKey;
    inpPrompt.value = config.systemPrompt || DEFAULT_PROMPT(config.org || 'your organization');
    overlay.classList.remove('hidden');
  }

  function closeSettings() {
    if (!activated) return;
    overlay.classList.add('hidden');
  }

  /* ── Save & Activate ────────────────────────────────────────────── */
  btnSave.addEventListener('click', () => {
    const org    = inpOrg.value.trim();
    const apiKey = inpKey.value.trim();
    const prompt = inpPrompt.value.trim();

    if (!org)    { showToast('Please enter your organization name.'); return; }
    if (!apiKey) { showToast('Please paste your Gemini API key.'); return; }
    if (!prompt) { showToast('System prompt cannot be blank.'); return; }

    config    = { org, apiKey, systemPrompt: prompt };
    activated = true;
    history   = [];

    overlay.classList.add('hidden');
    hint.classList.add('hidden');
    statusPill.classList.add('visible');
    userInput.disabled = false;
    btnSend.disabled   = false;
    userInput.focus();

    if (messages.querySelectorAll('.msg').length === 0) {
      appendBotMessage(`Hello! I'm **MediCare AI**, your medical and pharmaceutical assistant from **${org}**. How can I help you today?`);
    }
  });

  /* ── Chat ───────────────────────────────────────────────────────── */
  btnSend.addEventListener('click', e => { addRipple(e); sendMessage(); });
  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || !activated) return;

    userInput.value    = '';
    btnSend.disabled   = true;
    userInput.disabled = true;

    appendUserMessage(text);
    history.push({ role: 'user', parts: [{ text }] });

    const typingEl = appendTyping();

    try {
      const reply = await callGemini();
      typingEl.remove();
      appendBotMessage(reply);
      history.push({ role: 'model', parts: [{ text: reply }] });
    } catch (err) {
      typingEl.remove();
      appendBotMessage(`⚠️ ${parseGeminiError(err)}`);
    } finally {
      btnSend.disabled   = false;
      userInput.disabled = false;
      userInput.focus();
    }
  }

  /* ── Gemini API ─────────────────────────────────────────────────── */
  async function callGemini() {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${config.apiKey}`;

    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: config.systemPrompt }] },
        contents: history,
        generationConfig: { temperature: 0.7, maxOutputTokens: 1024 }
      })
    });

    if (!res.ok) throw await res.json().catch(() => ({}));

    const data = await res.json();
    const candidate = data.candidates?.[0];
    if (!candidate) throw new Error('No response from Gemini.');
    return candidate.content.parts.map(p => p.text).join('');
  }

  function parseGeminiError(err) {
    if (err?.error?.message) return err.error.message;
    if (err?.message)        return err.message;
    return 'Failed to reach the Gemini API. Check your API key and network.';
  }

  /* ── Render helpers ─────────────────────────────────────────────── */
  function appendUserMessage(text) {
    const el = document.createElement('div');
    el.className = 'msg user';
    el.innerHTML = `<div class="msg-avatar">👤</div>
                    <div class="msg-bubble">${escHtml(text)}</div>`;
    messages.appendChild(el);
    scrollBottom();
  }

  function appendBotMessage(text) {
    const el = document.createElement('div');
    el.className = 'msg bot';
    el.innerHTML = `<div class="msg-avatar">🏥</div>
                    <div class="msg-bubble">${formatMd(text)}</div>`;
    messages.appendChild(el);
    scrollBottom();
  }

  function appendTyping() {
    const el = document.createElement('div');
    el.className = 'msg bot';
    el.innerHTML = `<div class="msg-avatar">🏥</div>
                    <div class="msg-bubble">
                      <div class="typing-dots"><span></span><span></span><span></span></div>
                    </div>`;
    messages.appendChild(el);
    scrollBottom();
    return el;
  }

  function scrollBottom() { messages.scrollTop = messages.scrollHeight; }

  /* ── Markdown renderer ──────────────────────────────────────────── */
  function formatMd(text) {
    return escHtml(text)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,     '<em>$1</em>')
      .replace(/`(.+?)`/g,       '<code style="background:rgba(99,102,241,.18);padding:2px 6px;border-radius:5px;font-size:13px">$1</code>')
      .replace(/\n/g,            '<br>');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;')
              .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Ripple ─────────────────────────────────────────────────────── */
  function addRipple(e) {
    const btn  = btnSend;
    const rect = btn.getBoundingClientRect();
    const r    = document.createElement('span');
    const size = Math.max(rect.width, rect.height);
    r.className = 'ripple';
    r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
    btn.appendChild(r);
    r.addEventListener('animationend', () => r.remove());
  }

  /* ── Toast ──────────────────────────────────────────────────────── */
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
  }
</script>
</body>
</html>
